<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<meta name="description" content="Publisher could not find the requested page.">
		<meta name="robots" content="noindex, follow">
		<meta name="color-scheme" content="dark light">
		<meta name="theme-color" content="RGB(17,24,39)">
		<title>Page not found - Publisher</title>
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
		<link rel="stylesheet" href="styles/main.css">
		<script type="module" src="scripts/not-found.js"></script>
	</head>
	<body>
		<main class="not-found-page">
			<section class="not-found-panel" aria-labelledby="not-found-title">
				<p class="eyebrow">404</p>
				<h1 id="not-found-title">Page not found</h1>
				<p data-requested-path>The requested page is not available.</p>
				<div class="not-found-actions">
					<a class="not-found-link not-found-link-primary" href="/" data-home-link>
						<i class="fa-solid fa-house" aria-hidden="true"></i>
						<span>Open Publisher</span>
					</a>
					<a class="not-found-link" href="/" data-route-link hidden>
						<i class="fa-solid fa-arrow-right" aria-hidden="true"></i>
						<span>Try as note route</span>
					</a>
				</div>
			</section>
		</main>
	</body>
</html>
